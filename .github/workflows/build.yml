name: Build and Test

on:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: '3.13.0-rc.3'
            soabi: cp313-rc3-linux
          - os: windows-latest
            python-version: '3.13.0-rc.3'
            soabi: cp313-rc3-win
          - os: macos-latest
            python-version: '3.13.0-rc.3'
            soabi: cp313-rc3-macos
          - os: ubuntu-latest
            python-version: '3.14.0-alpha.0'
            soabi: cp314-alpha0-linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install setuptools wheel

      - name: Build
        run: |
          python setup.py bdist_wheel --soabi ${{ matrix.soabi }}

      - name: Install wheel
        run: |
          pip install build/dist/*.whl
        working-directory: ${{github.workspace}}

      - name: Test
        run: python -m ft_utils.tests.test_run_all
        working-directory: ${{github.workspace}}/build

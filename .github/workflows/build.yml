name: Build and Test

on:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        python-version: [3.13-rc, 3.13t-rc]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install wheel

      - name: Build and test
        run: |
          python setup.py bdist_wheel
